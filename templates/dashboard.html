<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body{
            background:#f2f2f2;
            font-family:Arial, sans-serif;
            text-align:center;
        }

        .dashboard-box{
            width:500px;
            background:white;
            padding:40px;
            margin:100px auto;
            border-radius:15px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
        }

        h1{
            color:#007bff;
        }

        h2{
            color:#28a745;
        }

        p{
            font-size:18px;
            color:gray;
        }

        .btn{
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        .users-btn{
            background:#007bff;
            margin-right:10px;
        }

        .register-btn{
            background:#28a745;
        }

        .logout-btn{
            background:#e74c3c;
            margin-top:20px;
        }

        .users-btn:hover{
            background:#0069d9;
        }

        .register-btn:hover{
            background:#218838;
        }

        .logout-btn:hover{
            background:#c0392b;
        }
    </style>
</head>

<body>

    <div class="dashboard-box">

        <h1>Welcome, {{ session['user'] }} 🚀</h1>

        <h2>Login Successful ✅</h2>

        <p>AWS One Click Deployment Project Dashboard</p>

        <br>

        <a href="/users">
            <button class="btn users-btn">
                Registered Users
            </button>
        </a>

        <a href="/register">
            <button class="btn register-btn">
                Register User
            </button>
        </a>

        <br><br>

        <a href="/logout"
           onclick="return confirm('Are you sure you want to logout?')">

            <button class="btn logout-btn">
                🚪 Logout
            </button>

        </a>

    </div>

</body>
</html>
