<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>
        body{
            background: #f2f2f2;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .dashboard-box{
            width: 500px;
            background: white;
            padding: 40px;
            margin: 100px auto;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
        }

        h1{
            color: #007bff;
        }

        p{
            font-size: 18px;
            color: gray;
        }

        .logout-btn{
            background: red;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
            font-size: 16px;
        }

        .logout-btn:hover{
            background: darkred;
        }
    </style>
</head>

<body>

    <div class="dashboard-box">

        <h1>Welcome to Dashboard 🚀</h1>

        <h2>Login Successful ✅</h2>

        <p>Welcome to AWS One Click Deployment Project</p>

        <a href="/logout">
    <button class="logout-btn">Logout</button>
</a>

    </div>

</body>
</html>
