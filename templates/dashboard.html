<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <style>

        body{
            background:#f2f2f2;
            font-family:Arial, sans-serif;
            text-align:center;
        }

        .dashboard-box{
            width:500px;
            background:white;
            padding:40px;
            margin:100px auto;
            border-radius:15px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
        }

        h1{
            color:#007bff;
        }

        h2{
            color:#333;
        }

        p{
            font-size:18px;
            color:gray;
        }

        .logout-btn{
            background:#e74c3c;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
            margin-top:20px;
            font-size:16px;
        }

        .logout-btn:hover{
            background:#c0392b;
        }

    </style>

</head>

<body>

    <div class="dashboard-box">

        <h1>Welcome, {{ session['user'] }} 🚀</h1>
        
        <h2 style="color:#28a745;">
            Login Successful ✅
        </h2>

<p>
    AWS One Click Deployment Project Dashboard
</p>
<br><br>

<a href="/users">
    <button style="
        background:#007bff;
        color:white;
        border:none;
        padding:12px 20px;
        border-radius:8px;
        cursor:pointer;
        margin-right:10px;">
        Registered Users
    </button>
</a>

<a href="/register">
    <button style="
        background:#28a745;
        color:white;
        border:none;
        padding:12px 20px;
        border-radius:8px;
        cursor:pointer;">
        Register User
    </button>
</a>

<br><br>
        <a href="/logout"
           onclick="return confirm('Are you sure you want to logout?')">

            <button class="logout-btn">
                🚪 Logout
            </button>

        </a>

    </div>

</body>
</html>
