<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body{
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .login-box{
            width: 350px;
            background: white;
            padding: 30px;
            margin: 100px auto;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1{
            color: #007bff;
        }

        input{
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid gray;
        }

        button{
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover{
            background: #0056b3;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <h1>AWS Project 🚀</h1>
        <h2>Login</h2>
        {% if error %}
<p style="color:red; font-weight:bold;">
    {{ error }}
</p>
{% endif %}

        <form action="/login" method="POST">

            <input type="email" name="email" placeholder="Enter Email" required>

            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>

        </form>

    </div>

</body>
</html>
