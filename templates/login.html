<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>

        body{
            background:linear-gradient(135deg,#eef2ff,#f8fafc);
            font-family:Arial, sans-serif;
        }

        .login-box{
            width:380px;
            background:white;
            padding:35px;
            margin:80px auto;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
            text-align:center;
        }

        h1{
            color:#0d6efd;
            margin-bottom:5px;
        }

        h2{
            color:#333;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border-radius:10px;
            border:1px solid #dcdcdc;
            box-sizing:border-box;
            transition:0.3s;
        }

        input:focus{
            outline:none;
            border:1px solid #0d6efd;
            box-shadow:0 0 8px rgba(13,110,253,0.3);
        }

        button{
            background:#0d6efd;
            color:white;
            border:none;
            padding:12px;
            width:100%;
            border-radius:10px;
            cursor:pointer;
            font-size:16px;
            font-weight:bold;
            transition:0.3s;
        }

        button:hover{
            background:#0b5ed7;
        }

        a{
            text-decoration:none;
            color:#0d6efd;
            font-weight:bold;
        }

        a:hover{
            color:#084298;
        }

        .error-box{
            background:#ffebee;
            color:#d32f2f;
            padding:10px;
            border-radius:8px;
            margin-bottom:15px;
        }

        .password-box{
            position:relative;
        }

        .password-box span{
            position:absolute;
            right:15px;
            top:50%;
            transform:translateY(-50%);
            cursor:pointer;
            user-select:none;
            font-size:18px;
        }

    </style>

</head>

<body>

    <div class="login-box">

        <h1>AWS Project 🚀</h1>

        <h2>Login</h2>

        {% if error %}
        <div class="error-box">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login" method="POST">

            <input
                type="email"
                name="email"
                placeholder="Enter Email"
                required
            >

            <div class="password-box">

                <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Enter Password"
                    required
                >

                <span id="eye" onclick="togglePassword()">
                    👁️
                </span>

            </div>

            <button type="submit">
                Login
            </button>

        </form>

        <br>

        <p>
            Don't have an account?
            <a href="/register">
                Register Here
            </a>
        </p>

    </div>

    <script>

        function togglePassword(){

            var password =
            document.getElementById("password");

            var eye =
            document.getElementById("eye");

            if(password.type === "password"){
                password.type = "text";
                eye.innerHTML = "👁️";
            }
            else{
                password.type = "password";
                eye.innerHTML = "👁️";
            }

        }

    </script>

</body>
</html>
