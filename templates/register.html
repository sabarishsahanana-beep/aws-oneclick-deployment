<!DOCTYPE html>
<html>
<head>
    <title>Register</title>

    <style>
        body{
            background-color:#f2f2f2;
            font-family: Arial, sans-serif;
        }

        .register-box{
            width:350px;
            background:white;
            padding:30px;
            margin:100px auto;
            border-radius:15px;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
            text-align:center;
        }

        h1{
            color:#007bff;
        }

        input{
            width:90%;
            padding:12px;
            margin:10px 0;
            border-radius:8px;
            border:1px solid gray;
        }

        button{
            background:#28a745;
            color:white;
            border:none;
            padding:12px;
            width:100%;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#218838;
        }

        a{
            text-decoration:none;
            color:#007bff;
            font-weight:bold;
        }

        a:hover{
            color:#0056b3;
        }

        #password{
            width:100%;
            padding:12px;
            padding-right:50px;
            border:1px solid #ccc;
            border-radius:5px;
            box-sizing:border-box;
}

    </style>
</head>

<body>

    <div class="register-box">

        <h1>AWS Project 🚀</h1>
        <h2>User Registration</h2>
        {% if error %}
        <div style="
        background:#ffebee;
        color:red;
        padding:10px;
        margin-bottom:15px;
        border-radius:5px;
        text-align:center;">
        {{ error }}
    </div>
    {% endif %}

        <form action="/register" method="POST">

            <input type="text" name="name" placeholder="Enter Name" required>

            <input type="email" name="email" placeholder="Enter Email" required>

            <div style="position:relative;">

    <input
    type="password"
    id="password"
    name="password"
    placeholder="Enter Password"
    required
    style="
        width:100%;
        padding:12px;
        padding-right:45px;
        border:1px solid #ccc;
        border-radius:5px;
        box-sizing:border-box;
    "
>

    <span
    id="eye"
    onclick="togglePassword()"
    style="
        position:absolute;
        right:18px;
        top:50%;
        transform:translateY(-50%);
        cursor:pointer;
        font-size:18px;
        user-select:none;
    ">
    👁️
</span>

</div>

            <button type="submit">Register</button>

        </form>

        <br>

        <a href="/">⬅ Back to Login</a>

    </div>
<script>

function togglePassword(){

    var password =
    document.getElementById("password");

    if(password.type === "password"){
        password.type = "text";
    }
    else{
        password.type = "password";
    }

}

</script>
</body>
</html>
