<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>

    <style>
        body{
            font-family:Arial;
            background:#f2f2f2;
            text-align:center;
        }

        .box{
            width:400px;
            background:white;
            margin:100px auto;
            padding:30px;
            border-radius:15px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h1{
            color:#007bff;
        }

        p{
            font-size:18px;
        }

        .btn{
            background:#007bff;
            color:white;
            border:none;
            padding:10px 20px;
            border-radius:8px;
            cursor:pointer;
        }
    </style>

</head>
<body>

<div class="box">

    <h1>👤 My Profile</h1>

    <p><b>Name:</b> {{ username }}</p>
    <p><b>Email:</b> Not Available</p>

    <a href="/dashboard">
        <button class="btn">
            Back to Dashboard
        </button>
    </a>

</div>

</body>
</html>
